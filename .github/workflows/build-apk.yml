name: Build Android APK with EAS

on:
  push:
    branches: [ main ]  # یا هر اسم برنچ دیگری مثل master
  workflow_dispatch:    # برای اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Expo and EAS
        run: |
          npm install -g eas-cli
          eas whoami || eas login --non-interactive

      - name: Install dependencies
        run: npm install

      - name: Build Android APK
        run: eas build -p android --profile preview --non-interactive --output=./app-build.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ./app-build.apk